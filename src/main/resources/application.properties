# ========================================
# APPLICATION NAME
# ========================================
spring.application.name=invest-platformPFE

# ========================================
# DATABASE CONFIGURATION
# ========================================
spring.datasource.url=jdbc:mysql://localhost:3306/investpfe_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# JPA CONFIGURATION
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# SERVER CONFIGURATION
# ========================================
server.port=8089

# ========================================
# KEYCLOAK CONFIGURATION
# ========================================
keycloak.realm=invest-platform
keycloak.auth-server-url=http://localhost:8080
keycloak.resource=invest-app
keycloak.public-client=true
keycloak.ssl-required=external
keycloak.bearer-only=true

# ========================================
# OAUTH2 RESOURCE SERVER
# ========================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/invest-platform
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/invest-platform/protocol/openid-connect/certs

# ========================================
# LOGGING CONFIGURATION
# ========================================
logging.level.tn.iset.investplatformpfe=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.keycloak=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.root=INFO
spring.output.ansi.enabled=ALWAYS

# ========================================
# ACTUATOR ENDPOINTS
# ========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
keycloak.admin-username=admin
keycloak.admin-password=admin

# ========================================
# UPLOAD CONFIGURATION
# ========================================
upload.path.profile-photos=uploads/profile-photos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Dossier de stockage pour les fichiers du chat
file.upload-dir=uploadschat

# Configuration WebSocket pour le chat
spring.websocket.broker.relay.enabled=false

# Ã¢ÂÂ Dossier pour les services d'investissement
upload.base-dir=uplodasservice
investment.service.upload-dir=${upload.base-dir}/investment-services
# Pour CollaborationService
collaboration.service.upload-dir=uplodasservice/collaboration-services
tourist.service.upload-dir=uploadservice/tourist-services
